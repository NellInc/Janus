<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="22" fill="#1a1a1e"/><g transform="translate(50 50) scale(1.3443) translate(-50.000 -50.000)">
  <defs>
    <clipPath id="jseam"><path d="M 50 32 C 55 40 55 60 50 68 C 45 60 45 40 50 32 Z"/></clipPath>
  </defs>

  <!-- LEFT gate: solid chevrons, receding leftward (the held / felt) -->
  <path d="M 43 34 L 35 50 L 43 66" fill="none" stroke="#2dd4bf" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 30 37 L 22 50 L 30 63" fill="none" stroke="#2dd4bf" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- RIGHT gate: solid chevrons, receding rightward (mirror, the held / felt) -->
  <path d="M 57 34 L 65 50 L 57 66" fill="none" stroke="#2dd4bf" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 70 37 L 78 50 L 70 63" fill="none" stroke="#2dd4bf" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- CENTRAL SEAM: engraved slit-lines within a lens = the measured threshold -->
  <g clip-path="url(#jseam)">
    <g stroke="#2dd4bf" stroke-width="2.6" stroke-linecap="round">
      <line x1="42" y1="38" x2="58" y2="38"/>
      <line x1="42" y1="44" x2="58" y2="44"/>
      <line x1="42" y1="50" x2="58" y2="50"/>
      <line x1="42" y1="56" x2="58" y2="56"/>
      <line x1="42" y1="62" x2="58" y2="62"/>
    </g>
  </g>
</g></svg>